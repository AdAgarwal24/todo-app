<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gaming-frame">
    <h1 class="title">My To-Do List</h1>
    <div class="main-layout">
    <div class="app">
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Enter a new task...">
            <button id="add-task-button">Add Task</button>
        </div>
        <div class="filter-section">
            <button id="filter-all" class="filter-button active">All</button>
            <button id="filter-pending" class="filter-button">Pending</button>
            <button id="filter-completed" class="filter-button">Completed</button>
        </div>
        <ul id="task-list">
            <!-- Tasks will be added here -->
        </ul>
        <div class="footer">
            <p>Total Tasks: <span id="task-count">0 tasks left</span></p>
            <button id="clear-tasks-button">Clear Completed Tasks</button>
        </div>
    </div>
    </div>
    
    <div class="bottom-bar"></div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
